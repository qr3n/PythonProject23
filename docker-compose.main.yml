x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: always
  networks:
    - remnawave-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  remnawave-subscription-page:
    image: remnawave/subscription-page:latest
    container_name: remnawave-subscription-page
    hostname: remnawave-subscription-page
    <<: [*common, *logging]
    environment:
      - APP_PORT=3010
      - REMNAWAVE_PANEL_URL=http://remnawave:3000
      - REMNAWAVE_API_TOKEN=${REMNAWAVE_API_TOKEN}
    ports:
      - 127.0.0.1:3010:3010
    depends_on:
      remnawave:
        condition: service_healthy

  remnawave-title-middleware:
    build: .
    container_name: remnawave-title-middleware
    hostname: remnawave-title-middleware
    <<: [*common, *logging]
    environment:
      - DATABASE_URL=postgresql+asyncpg://vpn:vpnpass@vpn-sub-db:5432/vpndb
      - REDIS_URL=redis://vpn-sub-redis:6379/0
      - REMNAWAVE_DATABASE_URL=postgresql://postgres:758610759ecccd4ff53e72ab1861d78fa5b4e58a34e415d1@remnawave-db:5432/postgres
      - BOT_DATABASE_URL=postgres://aerokit:aerokit@hazeevpnv4-postgres-1:5432/aerokit
      - SUBSCRIPTION_PAGE_URL=http://remnawave-subscription-page:3010
      - REMNAWAVE_PANEL_URL=http://remnawave:3000
      - REMNAWAVE_API_TOKEN=${REMNAWAVE_API_TOKEN}
      - CACHE_TTL_SECONDS=300
      - CACHE_NULL_TTL_SECONDS=30
      - API_TIMEOUT_MS=3000
      - DEBUG=true
    ports:
      - 127.0.0.1:3011:8000
    depends_on:
      remnawave:
        condition: service_healthy
      vpn-sub-db:
        condition: service_healthy
      vpn-sub-redis:
        condition: service_healthy
    networks:
      - remnawave-network
      - hazeevpn-network

  vpn-sub-db:
    image: postgres:16-alpine
    container_name: vpn-sub-db
    hostname: vpn-sub-db
    <<: [*common, *logging]
    environment:
      - POSTGRES_USER=vpn
      - POSTGRES_PASSWORD=vpnpass
      - POSTGRES_DB=vpndb
    volumes:
      - vpn-sub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpndb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - remnawave-network

  vpn-sub-redis:
    image: redis:7-alpine
    container_name: vpn-sub-redis
    hostname: vpn-sub-redis
    <<: [*common, *logging]
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vpn-sub-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - remnawave-network

  remnawave:
    image: remnawave/backend:2
    container_name: remnawave
    hostname: remnawave
    <<: [*common, *logging, *env]
    volumes:
      - valkey-socket:/var/run/valkey
    ports:
      - 127.0.0.1:3000:${APP_PORT:-3000}
      - 127.0.0.1:3001:${METRICS_PORT:-3001}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${METRICS_PORT:-3001}/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      remnawave-db:
        condition: service_healthy
      remnawave-redis:
        condition: service_healthy

  remnawave-db:
    image: postgres:17.6
    container_name: remnawave-db
    hostname: remnawave-db
    <<: [*common, *logging, *env]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=UTC
    ports:
      - 127.0.0.1:6767:5432
    volumes:
      - remnawave-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 3s
      timeout: 10s
      retries: 3

  remnawave-redis:
    image: valkey/valkey:9-alpine
    container_name: remnawave-redis
    hostname: remnawave-redis
    <<: [*common, *logging]
    volumes:
      - valkey-socket:/var/run/valkey
    command: >
      valkey-server
      --save ""
      --appendonly no
      --maxmemory-policy noeviction
      --loglevel warning
      --unixsocket /var/run/valkey/valkey.sock
      --unixsocketperm 777
      --port 0
    healthcheck:
      test: ['CMD', 'valkey-cli', '-s', '/var/run/valkey/valkey.sock', 'ping']
      interval: 3s
      timeout: 3s
      retries: 3

networks:
  remnawave-network:
    name: remnawave-network
    driver: bridge
    external: false
  hazeevpn-network:
    name: hazeevpn-network
    driver: bridge
    external: true

volumes:
  remnawave-db-data:
    name: remnawave-db-data
    driver: local
  vpn-sub-db-data:
    name: vpn-sub-db-data
    driver: local
  vpn-sub-redis-data:
    name: vpn-sub-redis-data
    driver: local
  valkey-socket:
    name: valkey-socket
    driver: local
